services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=8MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c max_wal_size=1GB
        -c checkpoint_completion_target=0.9
        -c max_parallel_workers_per_gather=0
        -c autovacuum_vacuum_cost_delay=10ms
        -c idle_in_transaction_session_timeout=30000
        -c log_min_duration_statement=2000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eveguru}
      POSTGRES_USER: ${POSTGRES_USER:-eveguru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eveguru}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sde:
    build: ./sde
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      SDE_CACHE_DIR: /sde_cache
      SDE_REFRESH_DAYS: ${SDE_REFRESH_DAYS:-30}
    volumes:
      - sde_cache:/sde_cache

  agent:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          memory: 64M
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      MAX_DAYS_SUPPLY: ${MAX_DAYS_SUPPLY:-60}
      MIN_DAILY_VOLUME: ${MIN_DAILY_VOLUME:-1}
      MIN_MARGIN_PCT:          ${MIN_MARGIN_PCT:-10.0}
      MIN_PROFIT_ISK:          ${MIN_PROFIT_ISK:-500000}
      PRICE_SANITY_MULTIPLIER: ${PRICE_SANITY_MULTIPLIER:-5.0}
      SHIPPING_COST_PER_M3: ${SHIPPING_COST_PER_M3:-1000}
      SALES_TAX_PCT: ${SALES_TAX_PCT:-3.6}
      BROKER_FEE_PCT: ${BROKER_FEE_PCT:-3.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # AI-powered daily email reports (DeepSeek by default; swap AI_BASE_URL+AI_MODEL for other providers)
      AI_API_KEY:    ${AI_API_KEY:-}
      AI_BASE_URL:   ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL:      ${AI_MODEL:-deepseek-chat}
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-eveguru2@localhost}
      REPORT_TO:     ${REPORT_TO:-}
      REPORT_HOUR:   ${REPORT_HOUR:-7}
    volumes:
      - ./logs:/app/logs

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      EVE_CLIENT_ID: ${EVE_CLIENT_ID}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-https://192.168.135.168:8443/auth/callback}
      PRICE_SANITY_MULTIPLIER: ${PRICE_SANITY_MULTIPLIER:-5.0}
      BROKER_FEE_PCT:          ${BROKER_FEE_PCT:-3.0}
      SALES_TAX_PCT:           ${SALES_TAX_PCT:-3.6}

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 16M
    environment:
      SERVER_IP: ${SERVER_IP:-192.168.135.168}
    volumes:
      - ssl_certs:/etc/nginx/certs
    depends_on:
      - api

volumes:
  postgres_data:
  ssl_certs:
  sde_cache:
