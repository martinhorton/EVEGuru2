services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eveguru}
      POSTGRES_USER: ${POSTGRES_USER:-eveguru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eveguru}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sde:
    build: ./sde
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      SDE_CACHE_DIR: /sde_cache
      SDE_REFRESH_DAYS: ${SDE_REFRESH_DAYS:-30}
    volumes:
      - sde_cache:/sde_cache

  agent:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      SHORTAGE_RATIO: ${SHORTAGE_RATIO:-2.0}
      MIN_DAILY_VOLUME: ${MIN_DAILY_VOLUME:-10}
      MIN_MARGIN_PCT: ${MIN_MARGIN_PCT:-10.0}
      SHIPPING_COST_PER_M3: ${SHIPPING_COST_PER_M3:-1000}
      SALES_TAX_PCT: ${SALES_TAX_PCT:-3.6}
      BROKER_FEE_PCT: ${BROKER_FEE_PCT:-3.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eveguru}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eveguru}
      EVE_CLIENT_ID: ${EVE_CLIENT_ID}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-https://192.168.135.168:8443/auth/callback}

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      SERVER_IP: ${SERVER_IP:-192.168.135.168}
    volumes:
      - ssl_certs:/etc/nginx/certs
    depends_on:
      - api

volumes:
  postgres_data:
  ssl_certs:
  sde_cache:
